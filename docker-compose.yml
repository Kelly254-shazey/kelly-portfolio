version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: portfoilo-db
    restart: always
    environment:
      POSTGRES_USER: portfoilo
      POSTGRES_PASSWORD: portfoilo_secret
      POSTGRES_DB: portfoilo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfoilo"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfoilo-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://portfoilo:portfoilo_secret@postgres:5432/portfoilo
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads

volumes:
  postgres_data:
  uploads:
